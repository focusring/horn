name: "Horn PDF/UA Checker"
description: "Validate PDF accessibility against PDF/UA-1 (Matterhorn Protocol)"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  path:
    description: "PDF file or directory to validate"
    required: true
  recurse:
    description: "Recursively scan directories"
    required: false
    default: "true"
  format:
    description: "Output format (text, json, sarif, junit)"
    required: false
    default: "sarif"
  fail-on:
    description: "Minimum severity to fail the step (error, warning, info)"
    required: false
    default: "error"
  version:
    description: "Horn version to use (default: latest)"
    required: false
    default: "latest"

outputs:
  report:
    description: "Path to the generated report file"
    value: ${{ steps.run.outputs.report }}
  compliant:
    description: "Whether all files are compliant (true/false)"
    value: ${{ steps.run.outputs.compliant }}

runs:
  using: "composite"
  steps:
    - name: Install Horn
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          RELEASE_URL=$(curl -s https://api.github.com/repos/focusring/horn/releases/latest \
            | grep "browser_download_url.*horn-linux-x86_64" \
            | cut -d '"' -f 4)
        else
          RELEASE_URL="https://github.com/focusring/horn/releases/download/${{ inputs.version }}/horn-linux-x86_64"
        fi
        curl -sL "$RELEASE_URL" -o /usr/local/bin/horn
        chmod +x /usr/local/bin/horn

    - name: Run Horn
      id: run
      shell: bash
      run: |
        REPORT_FILE="horn-report.${{ inputs.format }}"
        ARGS="validate ${{ inputs.path }}"
        ARGS="$ARGS --format ${{ inputs.format }}"
        ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"
        ARGS="$ARGS -o $REPORT_FILE"

        if [ "${{ inputs.recurse }}" = "true" ]; then
          ARGS="$ARGS --recurse"
        fi

        if horn $ARGS; then
          echo "compliant=true" >> "$GITHUB_OUTPUT"
        else
          echo "compliant=false" >> "$GITHUB_OUTPUT"
        fi

        echo "report=$REPORT_FILE" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF (if applicable)
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: horn-report.sarif
